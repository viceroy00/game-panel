## ===========================================
## Game Panel — Docker Compose (Windows Docker Desktop 호환)
## ===========================================
## 기존 서비스 컨테이너와 완전 격리:
##   - panel-net: 관리 시스템 전용 (API ↔ Nginx)
##   - game-net: 게임 서버 전용 (API → 게임 컨테이너 제어)
##   - 기존 서비스 컨테이너는 이 네트워크에 연결되지 않음
##
## Windows Docker Desktop:
##   - named pipe (/var/run/docker.sock은 Docker Desktop이 자동 매핑)
##   - WSL2 백엔드 기준으로 동작
## ===========================================

services:
  # ─── Nginx 리버스 프록시 ───
  nginx:
    image: nginx:alpine
    container_name: game-panel-nginx
    ports:
      - "${PANEL_HTTP_PORT:-8090}:8090"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - panel-net

  # ─── FastAPI 백엔드 ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: game-panel-backend
    volumes:
      # Windows Docker Desktop에서 /var/run/docker.sock은
      # WSL2 내부에서 자동 매핑됨 — 별도 설정 불필요
      - /var/run/docker.sock:/var/run/docker.sock
      - panel-data:/app/data
    env_file: .env
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - panel-net
      - game-net

  # ─── 프론트엔드 빌드 (init 컨테이너) ───
  frontend-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: game-panel-frontend-build
    volumes:
      - frontend-dist:/output
    command: sh -c "cp -r /usr/share/nginx/html/* /output/ 2>/dev/null; echo 'Frontend deployed'"
    restart: "no"

volumes:
  panel-data:
    name: game-panel-data
  frontend-dist:
    name: game-panel-frontend

networks:
  # 관리 패널 내부 전용
  panel-net:
    name: game-panel-internal

  # 게임 서버 전용 — 기존 서비스와 완전 격리
  game-net:
    name: game-servers
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
    labels:
      - "game-panel.network=true"
